{% extends "layout.html" %}

{% block title %}Eventos{% endblock %}

{% block content %}
    <div class="w3-container w3-teal w3-padding-16">
        <h2><i class="fa fa-clock-o w3-margin-right"></i>Linhas Temporais</h2>
    </div>

    <div class="w3-container w3-padding-32">
        <table class="w3-table-all w3-card-4 w3-hoverable">
            <thead>
                <tr class="w3-light-blue">
                    <th>Linha Id</th>
                    <th>Tipo da Linha</th>
                </tr>
            </thead>
            <tbody>
                {% for l in lines.values() %}
                <tr>
                    <td>
                      <a href="/linha/{{l.Linha_Id}}" class="w3-tag w3-light-grey w3-round w3-margin-bottom w3-margin-right w3-hover-teal" style="text-decoration:none">
                        <b>{{ l.Linha_Id }}</b>
                      </a>
                    </td>
                    <td><b>{{ l.Tipo_de_Linha }}</b></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
